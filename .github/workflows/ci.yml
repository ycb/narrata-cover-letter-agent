name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CI: true
      VITE_SUPABASE_URL: https://example.com
      VITE_SUPABASE_ANON_KEY: test-anon-key
      # VITE_OPENAI_API_KEY removed - OpenAI calls now happen server-side via Edge Functions
      # OPENAI_API_KEY removed - no longer needed in tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: PR metadata gate
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: npm run check:pr-body

      - name: Lint
        run: npm run lint

      - name: Core unit tests (coverage)
        run: npm run test:core

      - name: Diff coverage (core scope)
        run: npm run test:diff-coverage

      - name: Full unit tests (non-blocking)
        continue-on-error: true
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Upload core coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: coverage-core/

      - name: Upload full coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-full
          path: coverage/
